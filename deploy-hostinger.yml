name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 20

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Automatically handles secure and efficient caching for npm
          cache: 'npm'

      # Using 'npm ci' is faster, cleaner, and strictly respects your lockfile
      # while fetching the correct platform-specific binaries.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint check
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deploy para Hostinger realizado com sucesso!"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deploy para Hostinger falhou!"
